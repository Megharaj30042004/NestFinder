<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Booking | NestFinder</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<header>
    <a href="index.html" class="logo"><i class="fa-solid fa-building-user"></i> NestFinder</a>
    <div class="nav-links">
        <a href="index.html"><i class="fa-solid fa-arrow-left"></i> Cancel & Go Back</a>
    </div>
</header>

<div class="container">
    <div class="form-card">
        <h2 style="margin-bottom: 5px; color: #0f172a;" id="bTitle">Booking Summary</h2>
        <p style="color: #64748b; margin-bottom: 25px;" id="bLoc"></p>
        
        <div style="background: #f8fafc; padding: 20px; border-radius: 8px; margin-bottom: 25px; display: flex; justify-content: space-between; font-weight: 700; border: 1px solid #e2e8f0;">
            <span style="font-size: 16px;">Total Monthly Rent Due:</span>
            <span style="color: #2563eb; font-size: 20px;" id="bPrice"></span>
        </div>

        <form id="checkoutForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="uName" class="form-control" placeholder="Enter exactly as on ID" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="uEmail" class="form-control" placeholder="For booking receipt" required>
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="uPhone" class="form-control" placeholder="10-digit mobile number" required>
            </div>
            <button type="submit" class="btn-block" style="margin-top: 15px;">Confirm & Send Details</button>
        </form>
    </div>
</div>

<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script src="data.js"></script>
<script src="email.js"></script>
</body>
</html>
